<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="header">
        <div class="header-left">
            <i class="fas fa-bars menu-icon"></i>
            <div class="logo">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
                <span class="country-code">ET</span>
            </div>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" placeholder="Search">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="mic-icon"><i class="fas fa-microphone"></i></div>
        </div>
        <div class="header-right">
            <i class="fas fa-video"></i>
            <i class="fas fa-bell"></i>
            <div class="user-avatar">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User">
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-item active"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="sidebar-item"><i class="fab fa-slack-hash"></i><span>Shorts</span></div>
            <div class="sidebar-item"><i class="fas fa-layer-group"></i><span>Subscriptions</span></div>
            <hr>
            <div class="sidebar-item"><i class="fas fa-user-circle"></i><span>You</span></div>
            <div class="sidebar-item"><i class="fas fa-history"></i><span>History</span></div>
        </aside>

        <main class="content">
            <div class="category-chips">
                <div class="chip active">All</div>
                <div class="chip">Music</div>
                <div class="chip">Podcasts</div>
                <div class="chip">Mixes</div>
                <div class="chip">Ethiopian Music</div>
                <div class="chip">Computer programming</div>
                <div class="chip">Contemporary Worship</div>
                <div class="chip">Live</div>
            </div>

            <div class="video-grid" id="videoGrid">
                <!-- Video cards injected by JS -->
            </div>
        </main>
    </div>

    <!-- Watch Page Layout -->
    <div id="watchLayout" class="watch-layout" style="display: none;">
        <div class="watch-main">
            <video id="mainPlayer" controls autoplay></video>
            <h1 id="watchTitle" class="watch-title"></h1>
            <div class="watch-info-bar">
                <div class="watch-channel">
                    <img id="watchAvatar" src="" class="watch-channel-avatar">
                    <div class="watch-channel-info">
                        <h3 id="watchChannelName">Node</h3>
                        <p>125K subscribers</p>
                    </div>
                    <button class="subscribe-btn">Subscribe</button>
                </div>
                <div class="watch-actions">
                    <div class="action-group">
                        <button class="action-btn"><i class="far fa-thumbs-up"></i> <span>1.3K</span></button>
                        <button class="action-btn border-left"><i class="far fa-thumbs-down"></i></button>
                    </div>
                    <button class="action-btn"><i class="fas fa-share"></i> <span>Share</span></button>
                    <button class="action-btn"><i class="fas fa-download"></i> <span>Download</span></button>
                    <button class="action-btn circle-btn"><i class="fas fa-ellipsis-h"></i></button>
                </div>
            </div>
            <div class="watch-description">
                <p><strong>1.2M views • 2 days ago</strong></p>
                <p id="watchDesc"></p>
            </div>
        </div>
        <aside class="watch-sidebar">
            <div class="category-chips watch-chips">
                <div class="chip active">All</div>
                <div class="chip">Related</div>
                <div class="chip">For you</div>
            </div>
            <div id="relatedVideos" class="related-videos-list">
                <!-- Related videos injected by JS -->
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>

</html>
